<svg width="340" height="96" viewBox="0 0 340 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Circus One — original refreshed logo">
  <title>Circus One — Concept 4: Original Refreshed</title>
  <!--
    The original logo, structure faithfully replicated:
    - Face-on / top-down view (NOT edge-on Saturn-style)
    - A thick circular ring (arc) with a ~100° gap at upper-left (10-11 o'clock)
    - Tapered, rounded ends at the gap
    - A glossy bolder-red sphere centred inside, with white highlight upper-left
    - Flat 2D composition — ring drawn around sphere, no behind/in-front weaving
    - Ring outer diameter ~1.7× the sphere diameter; thick stroke
    Colors refreshed only: bolder red sphere, darker metallic grey ring.
    Wordmark: original split-tone preserved — 'circus' near-black, 'one' medium grey.
  -->
  <defs>
    <radialGradient id="sph4" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#E83838"/>
      <stop offset="40%" stop-color="#B82828"/>
      <stop offset="100%" stop-color="#6A1414"/>
    </radialGradient>
    <linearGradient id="ring4" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7A7774"/>
      <stop offset="50%" stop-color="#36332F"/>
      <stop offset="100%" stop-color="#56544F"/>
    </linearGradient>
  </defs>
  <g>
    <!-- Thick circular arc with ~100° gap at upper-left.
         Circle centre (42,48), radius 22, stroke-width 5.
         Arc starts at 275° (just past gap, near top) and sweeps clockwise
         260° to 175° (just before gap, near left). Gap centred at 225° (upper-left). -->
    <path d="M 43.9 26.1 A 22 22 0 1 1 20.1 49.9"
          fill="none" stroke="url(#ring4)" stroke-width="5" stroke-linecap="round"/>
    <!-- Glossy bolder-red sphere, centred -->
    <circle cx="42" cy="48" r="15" fill="url(#sph4)"/>
    <!-- Specular highlight, upper-left (mirrors the ring gap position) -->
    <ellipse cx="36.5" cy="42" rx="5.5" ry="4" fill="#FFFFFF" opacity="0.4"/>
    <ellipse cx="35.5" cy="41" rx="2.4" ry="1.6" fill="#FFFFFF" opacity="0.58"/>
  </g>
  <!-- Wordmark: 'circus' near-black, 'one' medium grey — original split-tone preserved -->
  <text x="86" y="59"
        font-family="'Trebuchet MS', 'Century Gothic', Futura, 'Segoe UI', sans-serif"
        font-size="34" font-weight="600" letter-spacing="-0.5">
    <tspan fill="#2A2825">circus</tspan><tspan fill="#6B6864">one</tspan>
  </text>
</svg>
