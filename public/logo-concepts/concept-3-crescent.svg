<svg width="340" height="96" viewBox="0 0 340 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Circus One — swoosh sphere logo">
  <title>Circus One — Concept 3: Swoosh Sphere</title>
  <!--
    Most like the original's dynamic swoosh. The orbit becomes a tapered
    swoosh band (a filled path, wider in the middle, narrowing at the ends)
    that breaks at upper-left and wraps around a glossy bolder-red sphere.
    The tapering and motion capture the original's "curved arrow / crescent
    wrapping around" quality more literally than a uniform stroke.
  -->
  <defs>
    <radialGradient id="sph3" cx="38%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#E03838"/>
      <stop offset="42%" stop-color="#B02828"/>
      <stop offset="100%" stop-color="#6E1414"/>
    </radialGradient>
    <linearGradient id="swoosh3" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#7A7774"/>
      <stop offset="50%" stop-color="#3A3835"/>
      <stop offset="100%" stop-color="#5C5A55"/>
    </linearGradient>
  </defs>
  <g>
    <!-- Swoosh back band (behind sphere): a tapered crescent, wider in middle -->
    <path d="M 14 50
             Q 42 28 70 46
             Q 70 44 68 43
             Q 42 24 16 47
             Q 14 48 14 50 Z"
          fill="url(#swoosh3)"/>
    <!-- Bolder red sphere -->
    <circle cx="42" cy="48" r="17" fill="url(#sph3)"/>
    <!-- Specular highlight -->
    <ellipse cx="36" cy="41" rx="6.5" ry="4.5" fill="#FFFFFF" opacity="0.38"/>
    <ellipse cx="35" cy="40" rx="2.8" ry="1.8" fill="#FFFFFF" opacity="0.55"/>
    <!-- Swoosh front band (in front of sphere, lower, tapered) -->
    <path d="M 16 52
             Q 42 70 68 52
             Q 68 50 66 50
             Q 42 66 18 50
             Q 16 51 16 52 Z"
          fill="url(#swoosh3)" opacity="0.92"/>
  </g>
  <text x="88" y="59"
        font-family="'Trebuchet MS', 'Century Gothic', Futura, 'Segoe UI', sans-serif"
        font-size="34" font-weight="600" letter-spacing="-0.5">
    <tspan fill="#2A2825">circus</tspan><tspan fill="#6B6864">one</tspan>
  </text>
</svg>
