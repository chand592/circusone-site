<svg width="340" height="96" viewBox="0 0 340 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Circus One — orbit sphere logo">
  <title>Circus One — Concept 1: Orbit Sphere</title>
  <!--
    Faithful to the original, face-on/top-down geometry (corrected):
    a thick circular ring with a gap at upper-left, around a glossy bolder-red
    sphere. Same composition as concept 4 but with a slightly thinner ring and
    a marginally smaller gap for a touch more refinement. Flat 2D, no weaving.
  -->
  <defs>
    <radialGradient id="sph1" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#E83838"/>
      <stop offset="40%" stop-color="#B82828"/>
      <stop offset="100%" stop-color="#6A1414"/>
    </radialGradient>
    <linearGradient id="ring1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7A7774"/>
      <stop offset="50%" stop-color="#36332F"/>
      <stop offset="100%" stop-color="#56544F"/>
    </linearGradient>
  </defs>
  <g>
    <!-- Face-on circular arc, ~90° gap at upper-left, slightly thinner ring -->
    <path d="M 45.2 25.4 A 23 23 0 1 1 19.4 47.2"
          fill="none" stroke="url(#ring1)" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="42" cy="48" r="15" fill="url(#sph1)"/>
    <ellipse cx="36.5" cy="42" rx="5.5" ry="4" fill="#FFFFFF" opacity="0.4"/>
    <ellipse cx="35.5" cy="41" rx="2.4" ry="1.6" fill="#FFFFFF" opacity="0.58"/>
  </g>
  <text x="86" y="59"
        font-family="'Trebuchet MS', 'Century Gothic', Futura, 'Segoe UI', sans-serif"
        font-size="34" font-weight="600" letter-spacing="-0.5">
    <tspan fill="#2A2825">circus</tspan><tspan fill="#6B6864">one</tspan>
  </text>
</svg>
